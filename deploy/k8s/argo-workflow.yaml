apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: audio-classification-pipeline-
  namespace: audio-classifier
  labels:
    app: audio-classifier
    component: ml-pipeline
spec:
  entrypoint: audio-classification-dag
  serviceAccountName: argo-workflow
  arguments:
    parameters:
      - name: config-path
        value: "/configs/pipeline_config.yaml"
      - name: input-dir
        value: "/data/input"
      - name: output-dir
        value: "/data/output"
      - name: commit-sha
        value: "unknown"
      - name: minio-data-bucket
        value: "pipeline-data"
      - name: minio-data-prefix
        value: "input"

  volumes:
    - name: config-volume
      configMap:
        name: pipeline-config
    - name: data-volume
      persistentVolumeClaim:
        claimName: pipeline-data-pvc

  templates:
    - name: audio-classification-dag
      dag:
        tasks:
          - name: download-data
            template: download-data-step
            arguments:
              parameters:
                - name: input-dir
                  value: "{{workflow.parameters.input-dir}}"
                - name: minio-bucket
                  value: "{{workflow.parameters.minio-data-bucket}}"
                - name: minio-prefix
                  value: "{{workflow.parameters.minio-data-prefix}}"

          - name: extract
            template: extract-step
            dependencies: [download-data]
            arguments:
              parameters:
                - name: config-path
                  value: "{{workflow.parameters.config-path}}"
                - name: input-dir
                  value: "{{workflow.parameters.input-dir}}"
                - name: output-dir
                  value: "{{workflow.parameters.output-dir}}"

          - name: train
            template: train-step
            dependencies: [extract]
            arguments:
              parameters:
                - name: config-path
                  value: "{{workflow.parameters.config-path}}"
                - name: output-dir
                  value: "{{workflow.parameters.output-dir}}"
                - name: commit-sha
                  value: "{{workflow.parameters.commit-sha}}"

          - name: evaluate
            template: evaluate-step
            dependencies: [train]
            arguments:
              parameters:
                - name: config-path
                  value: "{{workflow.parameters.config-path}}"
                - name: output-dir
                  value: "{{workflow.parameters.output-dir}}"
                - name: run-id
                  value: "{{tasks.train.outputs.parameters.run-id}}"

          - name: promote
            template: promote-step
            dependencies: [evaluate]
            arguments:
              parameters:
                - name: config-path
                  value: "{{workflow.parameters.config-path}}"
                - name: run-id
                  value: "{{tasks.train.outputs.parameters.run-id}}"
                - name: metrics-file
                  value: "{{workflow.parameters.output-dir}}/metrics.json"

          - name: deploy
            template: deploy-step
            dependencies: [promote]
            when: "{{tasks.promote.outputs.parameters.promoted}} == true"
            arguments:
              parameters:
                - name: run-id
                  value: "{{tasks.train.outputs.parameters.run-id}}"

    - name: download-data-step
      inputs:
        parameters:
          - name: input-dir
          - name: minio-bucket
          - name: minio-prefix
      container:
        image: audio-classifier-pipeline:latest
        imagePullPolicy: Never
        command: ["python", "-c"]
        args:
          - |
            import os, boto3
            endpoint = os.environ['MLFLOW_S3_ENDPOINT_URL']
            s3 = boto3.client('s3',
                endpoint_url=endpoint,
                aws_access_key_id=os.environ['AWS_ACCESS_KEY_ID'],
                aws_secret_access_key=os.environ['AWS_SECRET_ACCESS_KEY'],
            )
            bucket = '{{inputs.parameters.minio-bucket}}'
            prefix = '{{inputs.parameters.minio-prefix}}'
            output_dir = '{{inputs.parameters.input-dir}}'
            os.makedirs(output_dir, exist_ok=True)
            response = s3.list_objects_v2(Bucket=bucket, Prefix=prefix)
            if 'Contents' not in response:
                print(f'No objects found in s3://{bucket}/{prefix}')
                exit(1)
            for obj in response['Contents']:
                key = obj['Key']
                filename = os.path.basename(key)
                if not filename:
                    continue
                dest = os.path.join(output_dir, filename)
                print(f'Downloading: {key} -> {dest}')
                s3.download_file(bucket, key, dest)
            print(f'Downloaded {len(response["Contents"])} files to {output_dir}')
        volumeMounts:
          - name: data-volume
            mountPath: /data
        env:
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: minio-credentials
                key: access-key
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: minio-credentials
                key: secret-key
          - name: MLFLOW_S3_ENDPOINT_URL
            valueFrom:
              configMapKeyRef:
                name: minio-config
                key: endpoint_url
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

    - name: extract-step
      inputs:
        parameters:
          - name: config-path
          - name: input-dir
          - name: output-dir
      container:
        image: audio-classifier-pipeline:latest
        imagePullPolicy: Never
        command: ["python", "-m", "core.extraction"]
        args:
          - "--config"
          - "{{inputs.parameters.config-path}}"
          - "--input-dir"
          - "{{inputs.parameters.input-dir}}"
          - "--output-dir"
          - "{{inputs.parameters.output-dir}}"
        volumeMounts:
          - name: config-volume
            mountPath: /configs
          - name: data-volume
            mountPath: /data
        env:
          - name: MLFLOW_TRACKING_URI
            valueFrom:
              configMapKeyRef:
                name: mlflow-config
                key: tracking_uri
        resources:
          requests:
            cpu: "500m"
            memory: "2Gi"
          limits:
            cpu: "2"
            memory: "4Gi"

    - name: train-step
      inputs:
        parameters:
          - name: config-path
          - name: output-dir
          - name: commit-sha
      outputs:
        parameters:
          - name: run-id
            valueFrom:
              path: /tmp/run-id.txt
      container:
        image: audio-classifier-pipeline:latest
        imagePullPolicy: Never
        command: ["python", "-m", "core.training"]
        args:
          - "--config"
          - "{{inputs.parameters.config-path}}"
          - "--data-dir"
          - "{{inputs.parameters.output-dir}}"
          - "--output-dir"
          - "{{inputs.parameters.output-dir}}/model"
        volumeMounts:
          - name: config-volume
            mountPath: /configs
          - name: data-volume
            mountPath: /data
        env:
          - name: MLFLOW_TRACKING_URI
            valueFrom:
              configMapKeyRef:
                name: mlflow-config
                key: tracking_uri
          - name: MINIO_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: minio-credentials
                key: access-key
          - name: MINIO_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: minio-credentials
                key: secret-key
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: minio-credentials
                key: access-key
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: minio-credentials
                key: secret-key
          - name: MLFLOW_S3_ENDPOINT_URL
            valueFrom:
              configMapKeyRef:
                name: minio-config
                key: endpoint_url
        resources:
          requests:
            cpu: "2"
            memory: "4Gi"
          limits:
            cpu: "4"
            memory: "8Gi"

    - name: evaluate-step
      inputs:
        parameters:
          - name: config-path
          - name: output-dir
          - name: run-id
      container:
        image: audio-classifier-pipeline:latest
        imagePullPolicy: Never
        command: ["python", "-m", "core.evaluation"]
        args:
          - "--config"
          - "{{inputs.parameters.config-path}}"
          - "--model-dir"
          - "{{inputs.parameters.output-dir}}/model"
          - "--data-dir"
          - "{{inputs.parameters.output-dir}}"
          - "--run-id"
          - "{{inputs.parameters.run-id}}"
        volumeMounts:
          - name: config-volume
            mountPath: /configs
          - name: data-volume
            mountPath: /data
        env:
          - name: MLFLOW_TRACKING_URI
            valueFrom:
              configMapKeyRef:
                name: mlflow-config
                key: tracking_uri
        resources:
          requests:
            cpu: "1"
            memory: "2Gi"
          limits:
            cpu: "2"
            memory: "4Gi"

    - name: promote-step
      inputs:
        parameters:
          - name: config-path
          - name: run-id
          - name: metrics-file
      outputs:
        parameters:
          - name: promoted
            valueFrom:
              path: /tmp/promoted.txt
      container:
        image: audio-classifier-pipeline:latest
        imagePullPolicy: Never
        command: ["python", "-m", "core.promotion"]
        args:
          - "--config"
          - "{{inputs.parameters.config-path}}"
          - "--run-id"
          - "{{inputs.parameters.run-id}}"
          - "--metrics-file"
          - "{{inputs.parameters.metrics-file}}"
        volumeMounts:
          - name: config-volume
            mountPath: /configs
          - name: data-volume
            mountPath: /data
        env:
          - name: MLFLOW_TRACKING_URI
            valueFrom:
              configMapKeyRef:
                name: mlflow-config
                key: tracking_uri
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: minio-credentials
                key: access-key
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: minio-credentials
                key: secret-key
          - name: MLFLOW_S3_ENDPOINT_URL
            valueFrom:
              configMapKeyRef:
                name: minio-config
                key: endpoint_url
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1"
            memory: "1Gi"


    - name: deploy-step
      inputs:
        parameters:
          - name: run-id
      container:
        image: audio-classifier-pipeline:latest
        imagePullPolicy: Never
        command: ["/bin/bash", "-c"]
        args:
          - |
            MODEL_URI=$(python -c "
            import mlflow, os
            mlflow.set_tracking_uri(os.environ['MLFLOW_TRACKING_URI'])
            client = mlflow.tracking.MlflowClient()
            run = client.get_run('$RUN_ID')
            print(f'{run.info.artifact_uri}/model/')
            ")
            echo "Patching SeldonDeployment with modelUri: ${MODEL_URI}"
            kubectl patch seldondeployment audio-classifier -n audio-classifier --type=json \
              -p="[{\"op\":\"replace\",\"path\":\"/spec/predictors/0/graph/modelUri\",\"value\":\"${MODEL_URI}\"}]"
            kubectl rollout restart deployment -l seldon-app=audio-classifier -n audio-classifier 2>/dev/null || true
        env:
          - name: RUN_ID
            value: "{{inputs.parameters.run-id}}"
          - name: MLFLOW_TRACKING_URI
            valueFrom:
              configMapKeyRef:
                name: mlflow-config
                key: tracking_uri
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: minio-credentials
                key: access-key
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: minio-credentials
                key: secret-key
          - name: MLFLOW_S3_ENDPOINT_URL
            valueFrom:
              configMapKeyRef:
                name: minio-config
                key: endpoint_url
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
